# ─────────────────────────────────────────────────────────────────────────────
# Factory23 — Production Deploy Workflow
#
# Triggers:
#   push to `space`  → full build + deploy to production
#   pull_request      → lint + test only (no deploy)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions → New secret):
#   DO_ACCESS_TOKEN        Your DigitalOcean personal access token (doctl auth list)
#   DOKS_CLUSTER_ID        8236d5b0-a49e-4ed8-9310-b432b7e3e2d2
#   DO_REGISTRY            registry.digitalocean.com/con-reg
#
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy to Production

on:
  push:
    branches: [space]
  workflow_dispatch:
  pull_request:
    branches: [space]
    paths:
      - 'backend/src/**'
      - 'backend/Dockerfile'

env:
  REGISTRY: registry.digitalocean.com/con-reg
  IMAGE_NAME: registry.digitalocean.com/con-reg/backend
  DOKS_CLUSTER_ID: 8236d5b0-a49e-4ed8-9310-b432b7e3e2d2
  K8S_NAMESPACE: factory23

jobs:
  # ── Job 1: Lint & Test ────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/src

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: test_root_pass
          MYSQL_DATABASE: factory_api_test
          MYSQL_USER: factory_test
          MYSQL_PASSWORD: factory_test_pass
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -uroot -ptest_root_pass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, bcmath, gd, zip, pcntl, exif
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/src/vendor
          key: composer-${{ hashFiles('backend/src/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --optimize-autoloader --prefer-dist --no-interaction

      - name: Copy .env for testing
        run: cp .env.example .env

      - name: Configure test environment
        run: |
          php artisan key:generate
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=factory_api_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=factory_test/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=factory_test_pass/' .env
          sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env
          sed -i 's/APP_ENV=.*/APP_ENV=testing/' .env

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      - name: Run PHP syntax check
        run: find app config routes -name "*.php" -print0 | xargs -0 php -l | grep -v "No syntax errors" || true

      # - name: Run tests
      #   run: php artisan test --parallel --stop-on-failure 2>&1 || php artisan test --stop-on-failure

  # ── Job 2: Build & Push image ─────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/space'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Login to DO Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/space' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

  # ── Job 3: Deploy to Production ───────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://api.thefactory23.com/api/v1/health

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ env.DOKS_CLUSTER_ID }}

      - name: Set image tag variable
        id: tag
        run: echo "SHA_TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update K8s manifests with new image tag
        run: |
          NEW_IMAGE="${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.SHA_TAG }}"
          echo "Deploying image: $NEW_IMAGE"
          sed -i "s|${{ env.IMAGE_NAME }}:[^ ]*|$NEW_IMAGE|g" \
            backend/k8s/backend-deployment.yaml \
            backend/k8s/queue-worker-deployment.yaml \
            backend/k8s/scheduler-deployment.yaml

      - name: Apply ConfigMap & NetworkPolicy
        run: |
          kubectl apply -f backend/k8s/configmap.yaml -n ${{ env.K8S_NAMESPACE }}
          kubectl apply -f backend/k8s/network-policy.yaml -n ${{ env.K8S_NAMESPACE }}

      - name: Fix ingress load balancer traffic policy
        run: |
          # With externalTrafficPolicy=Local, DO LB health checks fail when ingress
          # runs on only one node in a multi-node pool — public traffic times out.
          kubectl patch svc ingress-nginx-controller -n ingress-nginx \
            --type merge \
            -p '{"spec":{"externalTrafficPolicy":"Cluster"}}' || true

      - name: Fix ingress load balancer health check
        run: |
          # DO may health-check port 10256 while ingress only answers on :80/:443.
          # Use TCP :80 so backends are marked healthy and the LB forwards traffic.
          kubectl annotate svc ingress-nginx-controller -n ingress-nginx \
            service.beta.kubernetes.io/do-loadbalancer-healthcheck-protocol=tcp \
            service.beta.kubernetes.io/do-loadbalancer-healthcheck-port="80" \
            --overwrite || true
          sleep 20

      - name: Remove in-cluster MySQL (managed DB only)
        run: |
          kubectl delete statefulset mysql -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true --wait=true
          kubectl delete cronjob mysql-backup -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          kubectl delete svc mysql mysql-service -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          kubectl delete pvc mysql-data-mysql-0 -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          kubectl delete networkpolicy allow-to-mysql -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true

      - name: Run database migrations (if any)
        run: |
          # Delete old migration job if exists
          kubectl delete job laravel-migrate -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true

          # Free CPU on small single-node clusters so the migrate pod can schedule.
          # Pending pods do not consume node CPU, but their requests still block scheduling.
          echo "Scaling backend to 1 replica to free cluster CPU for migration..."
          kubectl scale deployment/backend -n ${{ env.K8S_NAMESPACE }} --replicas=1
          kubectl rollout status deployment/backend -n ${{ env.K8S_NAMESPACE }} --timeout=180s || true

          # Update migrate job to use new image
          sed -i "s|${{ env.IMAGE_NAME }}:[^ ]*|${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.SHA_TAG }}|g" \
            backend/k8s/migrate-job.yaml
          kubectl apply -f backend/k8s/migrate-job.yaml -n ${{ env.K8S_NAMESPACE }}

          if ! kubectl wait --for=condition=complete job/laravel-migrate \
            -n ${{ env.K8S_NAMESPACE }} --timeout=600s; then
            echo "=== Migration job failed or timed out ==="
            kubectl describe job/laravel-migrate -n ${{ env.K8S_NAMESPACE }} || true
            kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=laravel-migrate -o wide || true
            kubectl describe pods -n ${{ env.K8S_NAMESPACE }} -l app=laravel-migrate || true
            kubectl logs -n ${{ env.K8S_NAMESPACE }} -l app=laravel-migrate --all-containers=true --tail=200 || true
            exit 1
          fi
          echo "Migrations complete"

      - name: Deploy backend (zero-downtime rolling)
        run: |
          kubectl apply -f backend/k8s/backend-deployment.yaml -n ${{ env.K8S_NAMESPACE }}
          kubectl apply -f backend/k8s/queue-worker-deployment.yaml -n ${{ env.K8S_NAMESPACE }}
          kubectl apply -f backend/k8s/scheduler-deployment.yaml -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/queue-worker \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/scheduler \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Smoke test — health endpoint
        run: |
          echo "Waiting for backend pods to be ready..."
          kubectl wait --for=condition=ready pod -l app=backend \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s

          # In-cluster check — validates the deployed app without depending on
          # public LB/DNS (which can lag or be down during node recovery).
          HEALTH=$(kubectl exec -n ${{ env.K8S_NAMESPACE }} deployment/backend -c nginx -- \
            wget -qO- http://127.0.0.1/api/v1/health 2>/dev/null || echo "FAIL")
          echo "Health response: $HEALTH"
          if ! echo "$HEALTH" | grep -q '"success":true'; then
            echo "SMOKE TEST FAILED — rolling back"
            kubectl rollout undo deployment/backend -n ${{ env.K8S_NAMESPACE }}
            exit 1
          fi
          echo "SMOKE TEST PASSED"

      - name: Smoke test — auth returns 401 (not 500)
        run: |
          AUTH_STATUS=$(kubectl exec -n ${{ env.K8S_NAMESPACE }} deployment/backend -c nginx -- \
            wget -qO /dev/null --server-response http://127.0.0.1/api/v1/user/me 2>&1 \
            | awk '/HTTP\// {print $2}' | tail -1)
          echo "Auth check status: $AUTH_STATUS"
          if [ "$AUTH_STATUS" != "401" ]; then
            echo "AUTH CHECK FAILED (expected 401, got $AUTH_STATUS)"
            kubectl rollout undo deployment/backend -n ${{ env.K8S_NAMESPACE }}
            exit 1
          fi
          echo "AUTH CHECK PASSED"

      - name: Print deployment summary
        if: always()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l "app in (backend,queue-worker,scheduler)"
          echo ""
          echo "=== Recent Events ==="
          kubectl get events -n ${{ env.K8S_NAMESPACE }} --sort-by='.lastTimestamp' | tail -10
