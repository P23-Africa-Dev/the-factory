# ─────────────────────────────────────────────────────────────────────────────
# Backend Deployment — PHP-FPM + Nginx (sidecar pattern)
# Image: registry.digitalocean.com/con-reg/backend:v2
# Replicas: 3 (HPA scales 3–10 based on CPU)
# Health: GET /api/v1/health  (HealthController exists, returns 200)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: factory23
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: factory23
    app.kubernetes.io/version: v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime rolling deploy
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
    spec:
      priorityClassName: factory23-high-priority
      terminationGracePeriodSeconds: 30

      imagePullSecrets:
        - name: do-registry

      # ── Init: populate shared volumes from the baked-in image ───────────────
      initContainers:
        - name: init-app
          image: registry.digitalocean.com/con-reg/backend:v2
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "[init-app] Ensuring required storage directories exist before config:cache..."
              mkdir -p /var/www/html/storage/framework/views \
                       /var/www/html/storage/framework/sessions \
                       /var/www/html/storage/framework/cache/data \
                       /var/www/html/storage/logs \
                       /var/www/html/storage/app/public

              echo "[init-app] Regenerating Laravel caches with production env vars..."
              php artisan config:cache
              php artisan route:cache
              php artisan event:cache
              php artisan view:cache 2>/dev/null || echo "[init-app] view:cache skipped"

              echo "[init-app] Creating storage symlink..."
              php artisan storage:link --force 2>/dev/null || true

              echo "[init-app] Copying public/ for nginx..."
              cp -r /var/www/html/public/. /srv/public/
              chmod -R 755 /srv/public

              echo "[init-app] Copying storage/ for php-fpm..."
              cp -rp /var/www/html/storage/. /srv/storage/
              # Ensure required framework subdirectories exist (missing from some Docker builds)
              mkdir -p /srv/storage/framework/views \
                       /srv/storage/framework/sessions \
                       /srv/storage/framework/cache/data \
                       /srv/storage/logs \
                       /srv/storage/app/public
              chown -R 33:33 /srv/storage
              chmod -R 775 /srv/storage

              echo "[init-app] Copying bootstrap/cache/ for php-fpm (production-generated)..."
              cp -rp /var/www/html/bootstrap/cache/. /srv/bootstrap-cache/
              chown -R 33:33 /srv/bootstrap-cache
              chmod -R 775 /srv/bootstrap-cache

              echo "[init-app] Done."

          securityContext:
            runAsUser: 0  # root required to chown

          envFrom:
            - configMapRef:
                name: factory23-config
            - secretRef:
                name: factory23-secret

          volumeMounts:
            - name: public-files
              mountPath: /srv/public
            - name: laravel-storage
              mountPath: /srv/storage
            - name: laravel-boot-cache
              mountPath: /srv/bootstrap-cache

      containers:
        # ── PHP-FPM ────────────────────────────────────────────────────────────
        - name: php-fpm
          image: registry.digitalocean.com/con-reg/backend:v2
          imagePullPolicy: IfNotPresent

          ports:
            - name: fpm
              containerPort: 9000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: factory23-config
            - secretRef:
                name: factory23-secret

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

          volumeMounts:
            - name: laravel-storage
              mountPath: /var/www/html/storage
            - name: laravel-boot-cache
              mountPath: /var/www/html/bootstrap/cache
            - name: php-custom-ini
              mountPath: /usr/local/etc/php/conf.d/99-custom.ini
              subPath: 99-custom.ini
              readOnly: true

          # PHP-FPM liveness: TCP check on port 9000
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5

          securityContext:
            allowPrivilegeEscalation: false
            # Note: php-fpm master starts as root then drops to www-data(33)
            # internally. runAsNonRoot cannot be set here.

        # ── Nginx sidecar ──────────────────────────────────────────────────────
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          volumeMounts:
            # Static assets served by nginx (populated by initContainer)
            - name: public-files
              mountPath: /var/www/html/public
              readOnly: true
            # storage/ needed so public/storage symlink resolves correctly
            - name: laravel-storage
              mountPath: /var/www/html/storage
              readOnly: true
            # Nginx site config from ConfigMap
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true

          # Nginx liveness: hit the actual Laravel health endpoint
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 80
              httpHeaders:
                - name: Accept
                  value: application/json
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 80
              httpHeaders:
                - name: Accept
                  value: application/json
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5

          securityContext:
            allowPrivilegeEscalation: false
            # nginx:alpine needs root to bind port 80 then drops internally

      # ── Shared volumes ────────────────────────────────────────────────────────
      volumes:
        - name: public-files
          emptyDir: {}
        - name: laravel-storage
          emptyDir: {}
        - name: laravel-boot-cache
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: php-custom-ini
          configMap:
            name: php-custom-ini
