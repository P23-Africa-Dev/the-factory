# ClusterIP service for the backend pods (port 80 → nginx container).
# Used by: Ingress, realtime server (for token auth), internal callers.
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: factory23
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
