# ─────────────────────────────────────────────────────────────────────────────
# Realtime WebSocket Relay Deployment
# Image: registry.digitalocean.com/con-reg/realtime:v1
# This is a SEPARATE Node.js image — cannot reuse backend:v1 (PHP-FPM).
# Build: cd backend/realtime-server && docker build -t ...con-reg/realtime:v1 .
#        docker push registry.digitalocean.com/con-reg/realtime:v1
#
# Health: GET /healthz (port 8081) — natively implemented in server.js
# Auth:   calls backend-service.factory23.svc.cluster.local /api/v1/user/me
# Redis:  subscribes to factory23.tracking.company.* channels
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime
  namespace: factory23
  labels:
    app.kubernetes.io/name: realtime
    app.kubernetes.io/component: websocket
    app.kubernetes.io/part-of: factory23
    app.kubernetes.io/version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realtime
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: realtime
        app.kubernetes.io/name: realtime
        app.kubernetes.io/component: websocket
    spec:
      priorityClassName: factory23-high-priority
      terminationGracePeriodSeconds: 30

      imagePullSecrets:
        - name: do-registry

      containers:
        - name: realtime
          image: registry.digitalocean.com/con-reg/realtime:v1
          imagePullPolicy: IfNotPresent

          ports:
            - name: ws
              containerPort: 8081
              protocol: TCP

          env:
            - name: TRACKING_WS_HOST
              valueFrom:
                configMapKeyRef:
                  name: factory23-config
                  key: TRACKING_WS_HOST
            - name: TRACKING_WS_PORT
              valueFrom:
                configMapKeyRef:
                  name: factory23-config
                  key: TRACKING_WS_PORT
            - name: TRACKING_WS_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: factory23-config
                  key: TRACKING_WS_REDIS_HOST
            - name: TRACKING_WS_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: factory23-config
                  key: TRACKING_WS_REDIS_PORT
            - name: TRACKING_WS_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: factory23-secret
                  key: TRACKING_WS_REDIS_PASSWORD
            - name: TRACKING_WS_REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: factory23-config
                  key: TRACKING_WS_REDIS_DB
