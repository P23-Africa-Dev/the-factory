# ─────────────────────────────────────────────────────────────────────────────
# secret.example.yaml  —  TEMPLATE ONLY. Never apply this file directly.
#
# Usage:
#   cp k8s/secret.example.yaml k8s/secret.yaml
#   # Edit k8s/secret.yaml and fill in all real values
#   kubectl apply -f k8s/secret.yaml
#
# Rules:
#   1. NEVER commit k8s/secret.yaml to version control.
#   2. Add `k8s/secret.yaml` to .gitignore before first commit.
#   3. All previously-exposed credentials MUST be rotated immediately.
#   4. For enterprise-grade secret management, migrate to:
#      - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#      - External Secrets Operator (https://external-secrets.io)
#      - DigitalOcean Secrets Manager via DOKS integration
#   5. For multi-replica file storage, upgrade FILESYSTEM_DISK from "local"
#      to "s3" and point to DigitalOcean Spaces (S3-compatible).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: factory23-secret
  namespace: factory23
type: Opaque
stringData:
  # ── Laravel Application ────────────────────────────────────────────────────
  # Generate with: php artisan key:generate --show
  # Format: base64:<32-byte-random-base64-string>
  APP_KEY: "base64:REPLACE_WITH_32_BYTE_BASE64_KEY"

  # ── DigitalOcean Managed Database ──────────────────────────────────────────
  # DB_HOST is set in configmap.yaml (factory23-config).
  DB_PASSWORD: "strong-password-16-chars-minimum"

  # ── Redis ─────────────────────────────────────────────────────────────────
  # Leave empty string "" if no Redis auth (current default)
  REDIS_PASSWORD: ""
  TRACKING_WS_REDIS_PASSWORD: ""

  # ── OpenAI ────────────────────────────────────────────────────────────────
  # From: https://platform.openai.com/api-keys
  OPENAI_API_KEY: "sk-proj-..."

  # ── Anthropic ─────────────────────────────────────────────────────────────
  # From: https://console.anthropic.com/account/keys
  ANTHROPIC_API_KEY: "sk-ant-api03-..."

  # ── DigitalOcean Spaces (S3-compatible storage) ────────────────────────────
  # Bucket: factory23-storage (region: lon1)
  # Create key: doctl spaces keys create <name> --grants "bucket=factory23-storage;permission=readwrite"
  AWS_ACCESS_KEY_ID: "DO00XXXXXXXXXXXXXXXXXXXX"
  AWS_SECRET_ACCESS_KEY: "your-spaces-secret-key-here"

  # ── Stripe ────────────────────────────────────────────────────────────────
  # From: https://dashboard.stripe.com/apikeys
  STRIPE_KEY: "pk_live_..."
  STRIPE_SECRET: "sk_live_..."

  # ── Mapbox ────────────────────────────────────────────────────────────────
  # From: https://account.mapbox.com/access-tokens/
  MAPBOX_PUBLIC_TOKEN: "pk.eyJ1Ijoi..."
  MAPBOX_SECRET_TOKEN: "sk.eyJ1Ijoi..."

  # ── Resend ────────────────────────────────────────────────────────────────
  # From: https://resend.com/api-keys
  RESEND_API_KEY: "re_..."

  # ── Google Calendar ───────────────────────────────────────────────────────
  # From: https://console.cloud.google.com/apis/credentials
  GOOGLE_CALENDAR_CLIENT_ID: "153399553569-....apps.googleusercontent.com"
  GOOGLE_CALENDAR_CLIENT_SECRET: "GOCSPX-..."

  # ── Admin ─────────────────────────────────────────────────────────────────
  ADMIN_DEFAULT_PASSWORD: "strong-admin-password-min-16-chars"

  # ── Manage Database (Prime Reset Token) ───────────────────────────────────
  # Prime passcode reset token for the super-admin "Manage Database" module.
  # Only holders of this token can reset the database-manager passcode.
  # Generate with: openssl rand -hex 32
  # Rotate by updating this secret and running: kubectl rollout restart
  #   deployment/backend deployment/queue-worker deployment/scheduler -n factory23
  DB_MANAGER_MASTER_RESET_TOKEN: "REPLACE_WITH_64_HEX_CHAR_TOKEN"

  # ── Mail (SMTP via Resend) ────────────────────────────────────────────────
  MAIL_HOST: "smtp.resend.com"
  MAIL_PORT: "465"
  MAIL_USERNAME: "resend"
  MAIL_PASSWORD: "re_..."
  MAIL_ENCRYPTION: "tls"
