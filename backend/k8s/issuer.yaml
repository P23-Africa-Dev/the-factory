# ─────────────────────────────────────────────────────────────────────────────
# Let's Encrypt ClusterIssuers (production + staging)
# Prerequisites:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.0/cert-manager.yaml
#   kubectl wait --for=condition=Available deployment --all -n cert-manager --timeout=120s
#
# CHANGE: Replace admin@thefactory23.com with your actual email address.
# Use letsencrypt-staging first to test, then switch to letsencrypt-prod.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@thefactory23.com  # CHANGE THIS
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
            # ingressTemplate stamps these annotations onto EVERY solver Ingress
            # cert-manager creates. Without this, a server-level ssl-redirect from
            # another Ingress for the same host could redirect the ACME challenge
            # to HTTPS before the solver can respond.
            ingressTemplate:
              metadata:
                annotations:
                  nginx.ingress.kubernetes.io/ssl-redirect: "false"
                  nginx.ingress.kubernetes.io/force-ssl-redirect: "false"

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@thefactory23.com  # CHANGE THIS
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
            # Same defense-in-depth: solver Ingress always allows plain HTTP
            ingressTemplate:
              metadata:
                annotations:
                  nginx.ingress.kubernetes.io/ssl-redirect: "false"
                  nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
