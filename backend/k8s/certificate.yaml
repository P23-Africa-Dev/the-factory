# ─────────────────────────────────────────────────────────────────────────────
# TLS Certificate for api.thefactory23.com
# cert-manager will auto-provision and renew via Let's Encrypt.
# Secret name referenced by ingress.yaml tls[].secretName.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-thefactory23-com-tls
  namespace: factory23
  labels:
    app.kubernetes.io/name: factory23
    app.kubernetes.io/component: tls
spec:
  secretName: api-thefactory23-com-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - api.thefactory23.com
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  renewBefore: 720h  # Renew 30 days before expiry
