# ─────────────────────────────────────────────────────────────────────────────
# Horizontal Pod Autoscaler — backend Deployment
# Scales: 1 → 10 replicas
# Triggers:
#   CPU average utilization >= 70%
#   Memory average utilization >= 80%
# Scale-up:   fast (0s stabilization, +2 replicas/min)
# Scale-down: slow (5 min stabilization, -1 replica/min)
# Prerequisites:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: factory23
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60  # Remove at most 1 replica per minute
    scaleUp:
      stabilizationWindowSeconds: 0    # Scale up immediately
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60  # Add at most 2 replicas per minute
