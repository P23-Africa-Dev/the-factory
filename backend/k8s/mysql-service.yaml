# Headless governing service — required by StatefulSet for stable pod DNS.
# Pod DNS: mysql-0.mysql.factory23.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: factory23
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP

---
# ClusterIP service for application connectivity.
# Referenced by: ConfigMap DB_HOST=mysql-service
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: factory23
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
