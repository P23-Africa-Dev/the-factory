# ─────────────────────────────────────────────────────────────────────────────
# mysql-pvc.yaml  —  REFERENCE ONLY
# The MySQL StatefulSet uses volumeClaimTemplates (not this file directly).
# The StatefulSet automatically creates: mysql-data-mysql-0
# Spec below matches what the StatefulSet provisions.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc-reference
  namespace: factory23
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: database
  annotations:
    documentation: >
      This PVC is created automatically by mysql-statefulset.yaml
      volumeClaimTemplates. Do not apply this file directly.
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 20Gi
