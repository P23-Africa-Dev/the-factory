<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A1D25" />
    <title>Offline — Factory 23</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a1d25;
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.75);
        --accent: #75adaf;
        --amber: #fbbf24;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(circle at top, #12313d 0%, var(--bg) 55%);
        color: var(--text);
        font-family: "Poppins", "Segoe UI", system-ui, -apple-system, sans-serif;
      }

      .shell {
        width: min(100%, 420px);
        text-align: center;
      }

      .icon-wrap {
        position: relative;
        width: 88px;
        height: 88px;
        margin: 0 auto 20px;
      }

      .pulse-ring {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        border: 1px solid rgba(251, 191, 36, 0.35);
        animation: pulseRing 2.4s ease-out infinite;
      }

      .pulse-ring:nth-child(2) {
        animation-delay: 0.8s;
      }

      .pulse-ring:nth-child(3) {
        animation-delay: 1.6s;
      }

      .icon-badge {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 88px;
        height: 88px;
        border-radius: 999px;
        border: 1px solid rgba(251, 191, 36, 0.3);
        background: rgba(251, 191, 36, 0.1);
        color: #fde68a;
        animation: floatIcon 2.8s ease-in-out infinite;
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      p {
        margin: 12px 0 0;
        font-size: 0.95rem;
        line-height: 1.6;
        color: var(--muted);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 18px;
        font-size: 0.82rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.82);
      }

      .dots {
        display: inline-flex;
        gap: 4px;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
        animation: bounceDot 1.2s ease-in-out infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      button {
        margin-top: 22px;
        border: 1px solid rgba(117, 173, 175, 0.4);
        background: rgba(117, 173, 175, 0.12);
        color: var(--accent);
        border-radius: 12px;
        padding: 10px 18px;
        font: inherit;
        font-size: 0.92rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.2s ease;
      }

      button:hover {
        background: rgba(117, 173, 175, 0.2);
      }

      button:active {
        transform: scale(0.98);
      }

      @keyframes pulseRing {
        0% {
          transform: scale(0.72);
          opacity: 0.8;
        }
        100% {
          transform: scale(1.35);
          opacity: 0;
        }
      }

      @keyframes floatIcon {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }

      @keyframes bounceDot {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.45;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="icon-wrap" aria-hidden="true">
        <span class="pulse-ring"></span>
        <span class="pulse-ring"></span>
        <span class="pulse-ring"></span>
        <div class="icon-badge">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M2 8.82a16 16 0 0 1 20 0M5 12.43a12 12 0 0 1 14 0M8.5 16.07a6 6 0 0 1 7 0M12 20h.01"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path d="m3 3 18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </div>
      </div>

      <h1>This page isn’t available offline</h1>
      <p>
        You can keep working in pages you’ve already opened. Any actions you take are saved
        locally and synchronize automatically when connectivity returns.
      </p>

      <div class="status">
        <span>Waiting for connection</span>
        <span class="dots" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </span>
      </div>

      <button type="button" id="retry-button">Try again</button>
    </main>

    <script>
      (function () {
        var PROBE_MS = 5000;
        var probeUrl = "/manifest.webmanifest";
        var isReconnecting = false;
        var probeTimer = null;

        function reloadPage() {
          if (isReconnecting) return;
          isReconnecting = true;
          window.location.reload();
        }

        function probeConnectivity() {
          if (isReconnecting) return;

          fetch(probeUrl, { method: "HEAD", cache: "no-store" })
            .then(function (response) {
              if (response.ok) reloadPage();
            })
            .catch(function () {});
        }

        function startListening() {
          window.addEventListener("online", reloadPage);

          if (!navigator.onLine) {
            probeTimer = window.setInterval(probeConnectivity, PROBE_MS);
          }
        }

        document.getElementById("retry-button").addEventListener("click", reloadPage);
        startListening();
      })();
    </script>
  </body>
</html>
